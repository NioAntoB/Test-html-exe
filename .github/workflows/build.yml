name: Build-Tauri-Ultra-Light
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build Application
        # On initialise Tauri et on compile en une seule fois
        run: |
          tauri init --app-name "MonApp" --window-title "Mon Application Legere" --dist-dir "../dist" --dev-path "../dist" --yes
          tauri build
        
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Logiciel-Poids-Plume
          path: src-tauri/target/release/MonApp.exe
